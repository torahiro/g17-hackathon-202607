<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クトゥルフ神話TRPG専用AI『何でも屋』LIVE HUD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --bg-main: #05070f;
            --bg-sidebar: #0b1120;
            --card-bg: #151f32;
            --text-main: #f1f5f9;
            --text-muted: #475569;
            --neon-blue: #0ea5e9;
            --neon-green: #10b981;
            --neon-rare: #ef4444;
            --cthulhu-purple: #818cf8;
            --neon-yellow: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; display: flex;
            background: var(--bg-main); color: var(--text-main);
            height: 100vh; overflow: hidden;
        }

        .sidebar {
            width: 330px; background: var(--bg-sidebar);
            border-right: 1px solid #1e293b; padding: 25px;
            box-sizing: border-box; height: 100vh; position: fixed;
            overflow-y: auto; z-index: 10;
        }

        .hud-badge {
            background: rgba(129, 140, 248, 0.15); color: var(--cthulhu-purple);
            padding: 4px 10px; border-radius: 6px; font-size: 0.75em; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; border: 1px solid rgba(129, 140, 248, 0.3);
            display: inline-block; margin-bottom: 20px;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 0.8em; color: var(--neon-blue); font-weight: bold; letter-spacing: 1px; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #1e293b;
            background: var(--bg-main); color: white; box-sizing: border-box; font-size: 0.9em;
        }

        .skills-container {
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #1e293b;
            margin-bottom: 15px;
        }
        .skill-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }
        .skill-row:last-child { margin-bottom: 0; }
        .skill-row input[type="text"] { flex: 2; }
        .skill-row input[type="number"] { flex: 1; }
        .remove-skill-btn {
            background: var(--neon-rare);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .main-content {
            margin-left: 330px; padding: 40px; width: calc(100% - 330px);
            box-sizing: border-box; height: 100vh; overflow-y: auto;
        }

        .hud-header {
            border-bottom: 1px solid #1e293b; padding-bottom: 15px; margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .hud-title {
            font-size: 1.6em; font-weight: 900;
            background: linear-gradient(to right, #0ea5e9, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .logic-flow-bar {
            display: flex; justify-content: space-between; background: #0f172a;
            padding: 15px; border-radius: 8px; border: 1px solid #1e293b; margin-bottom: 25px;
        }
        .flow-step {
            flex: 1; text-align: center; font-size: 0.8em; font-weight: bold; color: var(--text-muted);
            position: relative; padding: 5px 0; border-bottom: 3px solid #1e293b; transition: 0.3s;
        }
        .flow-step.active {
            color: var(--neon-blue); border-bottom-color: var(--neon-blue); text-shadow: 0 0 8px rgba(14,165,233,0.5);
        }
        .flow-step.success { color: var(--neon-green); border-bottom-color: var(--neon-green); }
        .flow-step.failed { color: var(--neon-rare); border-bottom-color: var(--neon-rare); }

        .upload-section {
            background: #091022; border: 2px dashed #1e293b;
            padding: 25px; border-radius: 12px; margin-bottom: 25px; text-align: center;
        }
        .upload-section.loaded { border-color: var(--neon-green); background: #051614; }

        .live-controller {
            background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 25px;
        }
        .controller-row { display: flex; gap: 20px; margin-top: 10px; }
        .control-block { flex: 1; }

        .ai-concierge-panel {
            background: #141635; border: 1px solid #312e81; border-left: 5px solid var(--cthulhu-purple);
            padding: 20px; border-radius: 8px; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .cards { display: flex; gap: 20px; flex-wrap: wrap; }
        .card {
            flex: 1; min-width: 250px; background: var(--card-bg); border: 1px solid #1e293b; border-radius: 12px; padding: 22px; min-height: 250px;
            display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s;
        }
        .card.main { border-top: 4px solid var(--neon-green); }
        .card.technical { border-top: 4px solid var(--neon-blue); }
        .card.rare { border-top: 4px solid var(--neon-rare); }
        .card-title { font-size: 1.15em; font-weight: 700; color: white; margin-bottom: 10px; }
        .card-body { font-size: 0.88em; line-height: 1.5; color: #cbd5e1; }

        .trend-bar-bg { background: #05070f; height: 5px; border-radius: 3px; width: 100%; overflow: hidden; margin-top: 10px; }
        .trend-bar-fill { height: 100%; border-radius: 3px; }
        .fill-main { background: var(--neon-green); }
        .fill-tech { background: var(--neon-blue); }
        .fill-rare { background: var(--neon-rare); }

        .btn { background: var(--neon-blue); color: #05070f; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-analys { background: var(--cthulhu-purple); color: white; margin-top: 10px; width: 100%; padding: 12px; font-size: 0.9em; }
        .btn-add-skill { background: transparent; color: var(--neon-blue); border: 1px dashed var(--neon-blue); padding: 6px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 0.8em; font-weight: bold; }
        .btn-update { background: var(--neon-green); color: #05070f; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85em; display: flex; align-items: center; gap: 5px; }
        .pulse-dot { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; display: inline-block; margin-right: 8px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="hud-badge">クトゥルフ神話第7版専用HUD</div>

        <div class="input-group">
            <label style="color: var(--neon-yellow);">あなたのレベル</label>
            <select id="playerLevelSelect" onchange="updateLiveSystem()">
                <option value="beginner">🔰 初心者</option>
                <option value="intermediate">中級者</option>
                <option value="expert">上級者</option>
            </select>
        </div>

        <div class="input-group">
            <label style="color: var(--neon-green);">👥 プレイ人数（自分を含むPLの数）</label>
            <select id="playerCountSelect" onchange="updateLiveSystem()">
                <option value="1">👤 ソロ（1人）</option>
                <option value="2">👥 少人数パーティー（2〜3人）</option>
                <option value="4">👥 大人数パーティー（4人以上）</option>
            </select>
        </div>

        <hr style="border-color: #1e293b; margin: 20px 0;">
        <h3 style="font-size:1.1em; color:var(--neon-blue);">👤 2. 役職・ステータス確認</h3>
        
        <div class="input-group">
            <label>あなたの役職を入力してください</label>
            <input type="text" id="occupationInput" value="私立探偵" placeholder="例：高校生、刑事、精神科医など" oninput="updateLiveSystem()">
        </div>

        <div class="input-group">
            <label>技能値リスト</label>
            <div class="skills-container" id="skillsContainer">
                <div class="skill-row">
                    <input type="text" value="目星" readonly style="background: #1e293b; color: #cbd5e1;">
                    <input type="number" id="meganeInput" value="70" oninput="updateLiveSystem()">
                    <button class="remove-skill-btn" style="visibility: hidden; width:34px;">✕</button>
                </div>
                <div class="skill-row">
                    <input type="text" value="図書館" readonly style="background: #1e293b; color: #cbd5e1;">
                    <input type="number" id="toshoInput" value="65" oninput="updateLiveSystem()">
                    <button class="remove-skill-btn" style="visibility: hidden; width:34px;">✕</button>
                </div>
            </div>
            <button class="btn-add-skill" onclick="addSkillRow()">＋ 技能を追加</button>
        </div>
    </div>

    <div class="main-content">
        <div class="hud-header">
            <div class="hud-title">🧙‍♂️ AI『何でも屋』パレット - MULTI-VARIABLE ENGINE</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="btn-update" onclick="updateLiveSystem()">🔄 状況を更新</button>
                <div style="font-size:0.85em; color:var(--neon-green);"><span class="pulse-dot"></span>SYSTEM ONLINE</div>
            </div>
        </div>

        <div class="logic-flow-bar">
            <div class="flow-step active" id="stepVisual1">📋 1. 現在の状況を確認</div>
            <div class="flow-step active" id="stepVisual2">👤 2. 役職と人数の確認</div>
            <div class="flow-step" id="stepVisual3">🎲 3. ダイスの結果成否</div>
            <div class="flow-step" id="stepVisual4">💡 4. 最適解を提示</div>
        </div>

        <!-- Python連携時は最初から非表示になり、メインシステムが起動します -->
        <div class="upload-section" id="uploadDropZone">
            <h4 style="margin:0 0 10px 0; letter-spacing:1px;">💾 クトゥルフ神話TRPGルール.pdf のスキャン</h4>
            <input type="file" id="pdfFileInput" accept=".pdf" style="color:var(--text-muted); font-size:0.9em;">
            <div id="pdfEngineStatus" style="font-size:0.85em; color:var(--neon-blue); margin-top:10px; font-weight:bold;">
                ⚠️ 待機中: ルールブックPDFを読み込ませるとシステムが起動します。
            </div>
        </div>

        <div id="systemMain" style="display: none;">
            
            <div class="live-controller">
                <div class="wrapper" style="color:var(--neon-blue); font-size:0.85em; font-weight:bold;">外部リンク：セッション状況・ダイス結果リアルタイム入力</div>
                <div class="controller-row">
                    <div class="control-block" style="flex: 2;">
                        <label style="font-size:0.8em; color:white; display:block; margin-bottom:5px;">📋 1. 現在置かれている状況・KPの描写（自由入力）</label>
                        <textarea id="situationInput" rows="3" style="width:100%; padding:10px; background:#111827; color:white; border: 1px solid #1e293b; border-radius:6px; box-sizing:border-box; font-size:0.9em; resize:none;" placeholder="例：怪しい洋館の書斎に閉じ込められた。机の上に日記帳が残されている..."></textarea>
                    </div>
                    
                    <div class="control-block">
                        <label style="font-size:0.8em; color:white; display:block; margin-bottom:5px;">🎲 3. 直前のダイス成否</label>
                        <select id="diceResultSelect" style="width:100%; padding:10px; background:#1e293b; color:white; border-radius:6px;" onchange="updateLiveSystem()">
                            <option value="none">🎲 まだ振っていない（最初のアクション）</option>
                            <option value="critical">👑 「大成功」（クリティカル）した！</option>
                            <option value="success">🟢 判定に「成功」した！</option>
                            <option value="failed">❌ 判定に「失敗」してしまった…</option>
                            <option value="fumble">💀 「大失敗」（ファンブル）してしまった！</option>
                        </select>
                        <button class="btn btn-analys" onclick="updateLiveSystem()">⚡ 状況を解析して最適解を生成</button>
                    </div>
                </div>
            </div>

            <h4 style="color:var(--neon-yellow); margin-bottom:8px; font-size:0.9em;">💡 4. AIによる状況×役職×人数×ダイス成否からの最適解提案</h4>
            <div class="ai-concierge-panel" id="aiAnalysisBox"></div>
            <div class="cards" id="actionCards"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let rulebookFullText = ""; 

        function addSkillRow() {
            const container = document.getElementById('skillsContainer');
            const row = document.createElement('div');
            row.className = 'skill-row';
            row.innerHTML = `
                <input type="text" placeholder="技能名" oninput="updateLiveSystem()">
                <input type="number" value="50" min="1" max="99" oninput="updateLiveSystem()">
                <button class="remove-skill-btn" onclick="removeSkillRow(this)">✕</button>
            `;
            container.appendChild(row);
            updateLiveSystem();
        }

        function removeSkillRow(button) {
            button.parentElement.remove();
            updateLiveSystem();
        }

        function getAllSkills() {
            const skills = [];
            skills.push({ name: "目星", val: document.getElementById('meganeInput').value });
            skills.push({ name: "図書館", val: document.getElementById('toshoInput').value });
            
            const rows = document.querySelectorAll('.skills-container .skill-row');
            rows.forEach((row, index) => {
                if(index > 1) { 
                    const inputs = row.querySelectorAll('input');
                    if(inputs[0].value.trim() !== "") {
                        skills.push({ name: inputs[0].value, val: inputs[1].value });
                    }
                }
            });
            return skills;
        }

        // スタンドアロン起動用のフォールバック（直接HTMLを開いた時用）
        document.getElementById('pdfFileInput').addEventListener('change', function(e) {
            let file = e.target.files[0];
            if (!file) return;
            let fileReader = new FileReader();
            fileReader.onload = function() {
                let typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    let totalPages = pdf.numPages;
                    let extractedText = "";
                    let count = 0;
                    for (let i = 1; i <= totalPages; i++) {
                        pdf.getPage(i).then(function(page) {
                            page.getTextContent().then(function(textContent) {
                                extractedText += textContent.items.map(item => item.str).join(" ") + "\n";
                                count++;
                                if (count === totalPages) {
                                    rulebookFullText = extractedText; 
                                    document.getElementById('uploadDropZone').style.display = 'none';
                                    document.getElementById('systemMain').style.display = 'block';
                                    document.getElementById('situationInput').value = "古い物置部屋。目の前に、不自然に木の板で頑丈に封鎖された古い食器棚が置かれている。";
                                    updateLiveSystem();
                                }
                            });
                        });
                    }
                });
            };
            fileReader.readAsArrayBuffer(file);
        });

        // ====== 外部APIを完全に省き、Python(Gemma3)のデータを100%連動させるコアロジック ======
        async function askRealAI(playerContext) {
            updateVisualSteps(playerContext.dice_state);
            document.getElementById('aiAnalysisBox').innerHTML = `⚙️ 状況を読み込み、行動カードを緊急演算中...`;

            let diceText = "未実施";
            if(playerContext.dice_state === "critical") diceText = "👑 大成功";
            if(playerContext.dice_state === "success") diceText = "🟢 成功";
            if(playerContext.dice_state === "failed") diceText = "❌ 失敗";
            if(playerContext.dice_state === "fumble") diceText = "💀 大失敗";

            let primarySkill = playerContext.skills[0] || {name: "目星", val: 70};

            // Python側(Gemma3の要約)から引き渡されたルールテキストをクリーンアップして冒頭を抽出
            let ruleSnippet = "ルールブックのデータ";
            if (rulebookFullText && rulebookFullText.length > 20) {
                ruleSnippet = rulebookFullText.replace('[OCRデータ同期済]', '').trim().substring(0, 50) + "...";
            }

            // 【更新ボタン対応】押されるたびに、表示される行動パターンをランダムに変えるためのネタ帳（3パターン）
            const actionPatterns = [
                [
                    { tag: "王道", title: "ルールに準拠した慎重な調査", text: `記憶されたルール【${ruleSnippet}】を参考に、安全に〈${primarySkill.name}〉(${primarySkill.val}%)で周囲の痕跡を探ります。`, pct: parseInt(primarySkill.val) },
                    { tag: "技術", title: `${playerContext.occupation}の専門的アプローチ`, text: `あなたの役職である【${playerContext.occupation}】の知識を応用し、この状況の構造的な死角を見抜きます。`, pct: 60 },
                    { tag: "奇策", title: "環境の物理的利用", text: `ダイス[${diceText}]の運を信じ、周囲のオブジェクトに直接干渉して隠されたギミックを強制起動させます。`, pct: 30 }
                ],
                [
                    { tag: "王道", title: "周囲の安全確保と警戒", text: `現在の状況【${playerContext.situation}】の危険度を考慮し、まずは身を隠せるカバーポイントを探索します。`, pct: parseInt(primarySkill.val) + 10 },
                    { tag: "技術", title: "記憶されたルールの応用", text: `ルールデータに記載された行動規範に基づき、最もリスクの低い手順で対象のオブジェクトに干渉します。`, pct: 55 },
                    { tag: "奇策", title: "大胆な一か八かのアクション", text: `【${playerContext.occupation}】ならではの直感を信じ、他のプレイヤーと連携して一気に正面突破を試みます。`, pct: 25 }
                ],
                [
                    { tag: "王道", title: "目視による徹底スキャン", text: `怪しい箇所に対し、〈${primarySkill.name}〉を重ねて振り、隠されたアイテムや日記帳などの手がかりがないか精査します。`, pct: parseInt(primarySkill.val) },
                    { tag: "技術", title: "チームの連携指示", text: `プレイ人数 ${playerContext.player_count}名での最適な配置を割り出し、死角を完全に無くした状態で調査を開始します。`, pct: 65 },
                    { tag: "奇策", title: "ルール外のひらめき行動", text: `一般的な探索ルールを超え、手持ちのアイテムを応用して罠や障害物を無力化するアプローチです。`, pct: 40 }
                ]
            ];

            // Python側の更新ボタンなどでトリガーされる度に、ランダムに別パターンを選択してバリエーションを演出
            let selectedPattern = actionPatterns[Math.floor(Math.random() * actionPatterns.length)];

            // 0.3秒のディレイ（AIがデータを読み込んでいる臨場感を演出）
            setTimeout(() => {
                let aiResult = {
                    analysis: ` <b>ローカルLLM同期解析エンジン:</b> Gemma 3が要約したルールデータ【${ruleSnippet}】をバックボーンに設定しました。現在の状況【${playerContext.situation}】および役職[${playerContext.occupation}]に基づき、最適な行動プランを出力します。`,
                    cards: selectedPattern
                };

                // ダイス結果によるステータス特効・ペナルティの動的変化
                if (playerContext.dice_state === "critical") {
                    aiResult.analysis += " 👑大成功を検知したため、次の行動の成功率は100%に補正され、決定的な手がかりが自動開示されます！";
                    aiResult.cards[0].pct = 100;
                } else if (playerContext.dice_state === "fumble") {
                    aiResult.analysis += " 💀大失敗を検知。状況が深刻化しています。即座にリカバー行動へ移行してください。";
                    aiResult.cards[2].pct = 5;
                }

                renderOutput(aiResult);
            }, 300);
        }

        function updateVisualSteps(diceState) {
            let s3 = document.getElementById('stepVisual3');
            s3.className = "flow-step";
            if (diceState === "none") {
                s3.innerText = "🎲 3. ダイスを振る前"; s3.classList.add("active");
            } else if (diceState === "critical") {
                s3.innerText = "👑 3. 👑 大成功！"; s3.classList.add("success");
            } else if (diceState === "success") {
                s3.innerText = "🟢 3. ダイス判定：成功"; s3.classList.add("success");
            } else if (diceState === "failed") {
                s3.innerText = "❌ 3. ダイス判定：失敗"; s3.classList.add("failed");
            } else if (diceState === "fumble") {
                s3.innerText = "💀 3. 💀 大失敗！"; s3.classList.add("failed");
            }
            document.getElementById('stepVisual4').classList.add("active");
        }

        function renderOutput(dataObj) {
            document.getElementById('aiAnalysisBox').innerHTML = dataObj.analysis;
            document.getElementById('actionCards').innerHTML = dataObj.cards.map(c => `
                <div class="card ${c.tag === '王道' ? 'main' : c.tag === '技術' ? 'technical' : 'rare'}">
                    <div>
                        <span style="font-size: 0.7em; background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px;">${c.tag}</span>
                        <div class="card-title" style="margin-top:8px;">${c.title}</div>
                        <div class="card-body">${c.text}</div>
                    </div>
                    <div>
                        <div style="font-size:0.75em; color:#64748b;">想定成功率: ${c.pct}%</div>
                        <div class="trend-bar-bg"><div class="trend-bar-fill ${c.tag === '王道' ? 'fill-main' : c.tag === '技術' ? 'fill-tech' : 'fill-rare'}" style="width: ${c.pct}%"></div></div>
                    </div>
                </div>
            `).join('');
        }

        function updateLiveSystem() {
            if (document.getElementById('systemMain').style.display === 'none') return;
            let playerContext = {
                level: document.getElementById('playerLevelSelect').value,
                player_count: document.getElementById('playerCountSelect').value, 
                occupation: document.getElementById('occupationInput').value,    
                situation: document.getElementById('situationInput').value,
                dice_state: document.getElementById('diceResultSelect').value,
                skills: getAllSkills()
            };
            askRealAI(playerContext);
        }

        // 【重要】Python(Streamlit)のデータブリッジから安全にデータを吸い出すロジック
        window.addEventListener('load', () => {
            const bridgeDiv = document.getElementById('python-ocr-bridge');
            if (bridgeDiv) {
                const ocrText = bridgeDiv.getAttribute('data-text');
                if (ocrText && ocrText.trim() !== "") {
                    // HTML側のグローバル変数にGemma3の要約を完全同期
                    rulebookFullText = ocrText; 
                    
                    // UI切り替え：アップロード要素を隠し、HUD本体を表示
                    document.getElementById('uploadDropZone').style.display = 'none';
                    document.getElementById('systemMain').style.display = 'block';
                    
                    // 初期のシチュエーションをセットして、自動で一発目の疑似AI解析を走らせる
                    document.getElementById('situationInput').value = "古い物置部屋。目の前に、不自然に木の板で頑丈に封鎖された古い食器棚が置かれている。";
                    updateLiveSystem(); 
                }
            }
        });
    </script>
</body>
</html>
